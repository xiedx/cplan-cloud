server:
  port: 8081

spring:
  application:
    name: cplan-user
  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/cplan_user?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: "${MYSQL_USER:root}"
    password: "${MYSQL_PASSWORD:cplan123456}"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
  data:
    redis:
      host: "${REDIS_HOST:127.0.0.1}"
      port: 6379
      password: "${REDIS_PASSWORD:cplan@redis123}"
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT configuration — overridden by Nacos Config (cplan-common.yaml)
cplan:
  jwt:
    secret: "${CPLAN_JWT_SECRET:cplan-default-secret-key-change-in-production-32chars-min}"
    expire-seconds: 86400

logging:
  level:
    com.cplan.user: DEBUG
