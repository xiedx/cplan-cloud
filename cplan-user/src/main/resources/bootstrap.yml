spring:
  cloud:
    nacos:
      discovery:
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        namespace: "${NACOS_NAMESPACE:cplan-dev}"
        group: DEFAULT_GROUP
      config:
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        namespace: "${NACOS_NAMESPACE:cplan-dev}"
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: cplan-common.yaml
            group: DEFAULT_GROUP
            refresh: true
